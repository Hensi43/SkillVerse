version: '3.8'

services:
  # MongoDB Database Service
  mongo:
    image: mongo:latest
    container_name: skillverse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - skillverse-network

  # Redis Service (for BullMQ / Scale)
  redis:
    image: redis:alpine
    container_name: skillverse-redis
    ports:
      - "6379:6379"
    networks:
      - skillverse-network

  # Backend Express Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillverse-backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/skillverse
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=skillverse-super-secret-access-token-key-2026
      - JWT_REFRESH_SECRET=skillverse-super-secret-refresh-token-key-2026
      - MOCK_OTP=true
      - STORAGE_PROVIDER=local
      - UPLOAD_DIR=uploads
    volumes:
      - ./backend:/app
      - /app/node_modules # Anonymous volume prevents host node_modules override
    depends_on:
      - mongo
      - redis
    networks:
      - skillverse-network

  # Frontend Vite React Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillverse-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume prevents host node_modules override
    depends_on:
      - backend
    networks:
      - skillverse-network

volumes:
  mongo_data:
    driver: local

networks:
  skillverse-network:
    driver: bridge
